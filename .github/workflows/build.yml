name: Build Tauri App

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (must start with v), e.g. v1.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-24.04]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # For manual runs, create/push the tag so the release has a real tag behind it.
      - name: Create and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^v ]]; then
            echo "Version must start with 'v' (example: v1.2.3). Got: $VERSION"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # fail if tag already exists remotely
          if git ls-remote --tags origin "$VERSION" | grep -q "$VERSION"; then
            echo "Tag already exists on origin: $VERSION"
            exit 1
          fi

          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Build Tauri app + create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          releaseName: "Lovable Timer ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          releaseDraft: false
          prerelease: false
