name: Build Tauri App

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-24.04]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Compute release tag
        id: relinfo
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "name=Lovable Timer ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TAG="build-${{ github.run_number }}-${SHORT_SHA}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "name=Lovable Timer ${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri app (publish release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.relinfo.outputs.tag }}
          releaseName: ${{ steps.relinfo.outputs.name }}
          releaseBody: "Lovable-themed floating countdown timer for presentations. Linux build targets Ubuntu 24.04+ (libwebkit2gtk-4.1). See SIGNING.md for code-signing notes; Windows installers are currently unsigned."
          releaseDraft: false
          prerelease: false
